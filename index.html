<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050403;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:white}

/* ───────── LOADING SCREEN ───────── */
#loading{
  position:fixed;inset:0;
  background:#050403;
  z-index:9999;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* CLICK TO START */
#enter{
  position:absolute;
  bottom:15%;
  font-size:14px;
  letter-spacing:4px;
  color:rgba(255,255,255,0.5);
  cursor:pointer;
  animation:pulse 1.5s infinite;
  padding:10px 20px;
  border:1px solid rgba(255,255,255,0.3);
  transition:all 0.3s ease;
}

#enter:hover{
  color:rgba(255,255,255,0.8);
  border-color:rgba(255,255,255,0.6);
  background:rgba(255,255,255,0.05);
}

#enter:focus{
  outline:none;
  box-shadow:0 0 15px rgba(255,255,255,0.3);
}

@keyframes pulse{
  0%,100%{opacity:0.3}
  50%{opacity:1}
}

/* SHOOTER */
.shooter{
  position:absolute;
  bottom:18%;
  left:8%;
  width:130px;height:220px;
  background:#000;
  clip-path:polygon(45% 0,60% 0,70% 25%,65% 70%,55% 100%,45% 100%,35% 70%,30% 25%);
  opacity:0;
}

.gun{
  position:absolute;
  top:50%;right:-45px;
  width:60px;height:10px;
  background:#111;
  transform:rotate(-8deg);
}

.flash{
  position:absolute;
  top:48%;right:-65px;
  width:25px;height:25px;
  border-radius:50%;
  background:radial-gradient(circle,#fff 0%,#ffcc66 40%,transparent 70%);
  opacity:0;
}

.impact{
  position:absolute;
  top:40%;left:60%;
  width:8px;height:8px;
  border-radius:50%;
  background:white;
  opacity:0;
}

.crack{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 60% 40%, rgba(255,255,255,0.5) 0%, transparent 40%),
    repeating-radial-gradient(circle at 60% 40%, transparent 0 10px, rgba(255,255,255,0.08) 11px 12px);
  opacity:0;
}

/* MAIN SITE */
#main{
  position:absolute;
  inset:0;
  opacity:0;
}

/* ANIMATIONS */
.shooter.play{animation:enter 0.6s forwards}
.flash.play{animation:flash 0.15s ease 1s forwards}
.impact.play{animation:impact 0.2s ease 1.1s forwards}
.crack.play{animation:crack 0.4s ease 1.2s forwards}
#loading.fade{animation:fadeOut 0.8s ease 2.5s forwards}
#main.show{animation:showMain 1s ease forwards}

@keyframes enter{
  from{transform:translateX(-120px);opacity:0}
  to{transform:translateX(0);opacity:1}
}
@keyframes flash{
  0%{opacity:0;transform:scale(0.5)}
  50%{opacity:1;transform:scale(1.5)}
  100%{opacity:0}
}
@keyframes impact{
  from{opacity:0;transform:scale(0.5)}
  to{opacity:1;transform:scale(2)}
}
@keyframes crack{
  from{opacity:0}
  to{opacity:0.5}
}
@keyframes fadeOut{
  to{opacity:0;pointer-events:none}
}
@keyframes showMain{
  to{opacity:1}
}

/* AAA BACKGROUND */
.bg{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 70% 40%, rgba(255,200,100,0.08), transparent 60%),
    linear-gradient(120deg,#0a0907,#14110c,#050403);
}

/* CINEMATIC DARK EDGES */
.vignette{
  position:absolute;
  inset:0;
  background:radial-gradient(circle,transparent 50%,rgba(0,0,0,0.6));
  pointer-events:none;
}

.menu{
  position:absolute;
  left:5%;
  top:50%;
  transform:translateY(-50%);
}

.menu-item{
  font-size:60px;
  margin:12px 0;
  letter-spacing:4px;
  opacity:0;
  transform:translateX(-40px);
  cursor:pointer;
  transition:0.4s ease;
  padding:8px 12px;
  border-left:3px solid transparent;
}

/* appear animation */
#main.show .menu-item{
  opacity:0.6;
  transform:translateX(0);
}

/* stagger */
#main.show .menu-item:nth-child(1){transition-delay:0.2s}
#main.show .menu-item:nth-child(2){transition-delay:0.35s}
#main.show .menu-item:nth-child(3){transition-delay:0.5s}
#main.show .menu-item:nth-child(4){transition-delay:0.65s}

/* hover & focus */
.menu-item:hover,
.menu-item.active{
  opacity:1;
  transform:translateX(15px) scale(1.05);
  text-shadow:0 0 25px rgba(255,255,255,0.25);
  border-left-color:rgba(255,200,100,0.6);
}

.menu-item:focus{
  outline:none;
  border-left-color:rgba(255,200,100,1);
}

/* HUD */
.hud{
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
  font-size:12px;
  opacity:0.5;
  display:flex;
  justify-content:center;
  gap:30px;
}

.bg::after{
  content:'';
  position:absolute;
  top:30%;
  right:20%;
  width:200px;
  height:300px;
  background:radial-gradient(circle, rgba(255,200,120,0.15), transparent 70%);
  filter:blur(20px);
  animation:flicker 6s infinite;
}

@keyframes flicker{
  0%,100%{opacity:1}
  50%{opacity:0.6}
}

body::after{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 2px,
      rgba(255,255,255,0.03) 2px,
      rgba(255,255,255,0.03) 4px
    );
  opacity:1;
}

/* Custom cursor */
body{
  cursor:none;
}

#cursor{
  position:fixed;
  width:10px;
  height:10px;
  border:1px solid white;
  border-radius:50%;
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:10000;
}

/* MOBILE RESPONSIVENESS */
@media (max-width:768px){
  .menu-item{
    font-size:36px;
    margin:8px 0;
    padding:12px;
  }

  .hud{
    font-size:10px;
    gap:15px;
    flex-wrap:wrap;
  }

  .shooter{
    display:none;
  }

  #enter{
    font-size:12px;
  }

  /* Hide custom cursor on touch */
  @media (hover:none){
    #cursor{
      display:none;
    }
    body{
      cursor:auto;
    }
  }
}

@media (max-width:480px){
  .menu-item{
    font-size:24px;
    margin:6px 0;
  }

  .vignette{
    background:radial-gradient(circle,transparent 40%,rgba(0,0,0,0.7));
  }
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="gunshot" preload="auto">
  <source src="gunshot.mp3" type="audio/mpeg">
</audio>

<!-- LOADING -->
<div id="loading" role="status" aria-label="Loading animation">

  <div class="shooter" id="shooter" aria-hidden="true">
    <div class="gun"></div>
    <div class="flash" id="flash"></div>
  </div>

  <div class="impact" id="impact" aria-hidden="true"></div>
  <div class="crack" id="crack" aria-hidden="true"></div>

  <button id="enter" aria-label="Click to enter portfolio">[ CLICK TO ENTER ]</button>
</div>

<!-- MAIN -->
<div id="main" role="main">

  <div id="cursor" aria-hidden="true"></div>

  <!-- BACKGROUND -->
  <div class="bg" aria-hidden="true"></div>

  <!-- VIGNETTE -->
  <div class="vignette" aria-hidden="true"></div>

  <!-- NAVIGATION MENU -->
  <nav class="menu" role="navigation" aria-label="Main menu">
    <button class="menu-item" data-section="about">ABOUT</button>
    <button class="menu-item" data-section="skills">SKILLS</button>
    <button class="menu-item" data-section="projects">PROJECTS</button>
    <button class="menu-item" data-section="contact">CONTACT</button>
  </nav>

  <!-- HUD -->
  <div class="hud" aria-label="Keyboard navigation hints">
    <span>↑ ↓ Navigate</span>
    <span>Enter Select</span>
    <span>ESC Back</span>
  </div>
</div>

<script>
const shooter = document.getElementById('shooter');
const flash = document.getElementById('flash');
const impact = document.getElementById('impact');
const crack = document.getElementById('crack');
const loading = document.getElementById('loading');
const main = document.getElementById('main');
const gun = document.getElementById('gunshot');
const enterBtn = document.getElementById('enter');
const menuItems = document.querySelectorAll('.menu-item');
const cursor = document.getElementById('cursor');

let selectedIndex = 0;
let animationPlayed = false;

// ────── ENTER ANIMATION ──────
enterBtn.addEventListener('click', playEnterAnimation);
enterBtn.addEventListener('keypress', (e) => {
  if (e.key === 'Enter' || e.key === ' ') {
    playEnterAnimation();
  }
});

function playEnterAnimation() {
  if (animationPlayed) return;
  animationPlayed = true;

  // start animations
  shooter.classList.add('play');
  flash.classList.add('play');
  impact.classList.add('play');
  crack.classList.add('play');

  // play sound EXACTLY at flash (1s)
  setTimeout(() => {
    gun.currentTime = 0;
    gun.play().catch(() => console.log('Audio playback failed or blocked'));
  }, 1000);

  // transition to site
  setTimeout(() => {
    loading.classList.add('fade');
    main.classList.add('show');
    enterBtn.style.display = 'none';
    menuItems[0].focus();
  }, 2500);
}

// ────── KEYBOARD NAVIGATION ──────
document.addEventListener('keydown', (e) => {
  if (!main.classList.contains('show')) return;

  const itemCount = menuItems.length;

  switch(e.key) {
    case 'ArrowUp':
      e.preventDefault();
      selectedIndex = (selectedIndex - 1 + itemCount) % itemCount;
      updateSelection();
      break;
    case 'ArrowDown':
      e.preventDefault();
      selectedIndex = (selectedIndex + 1) % itemCount;
      updateSelection();
      break;
    case 'Enter':
      e.preventDefault();
      handleMenuSelect(menuItems[selectedIndex]);
      break;
    case 'Escape':
      handleEscape();
      break;
  }
});

function updateSelection() {
  menuItems.forEach((item, idx) => {
    if (idx === selectedIndex) {
      item.classList.add('active');
      item.focus();
    } else {
      item.classList.remove('active');
    }
  });
}

function handleMenuSelect(item) {
  const section = item.dataset.section;
  console.log('Selected:', section);
  // Add your navigation logic here
}

function handleEscape() {
  console.log('ESC pressed');
  // Add your back/close logic here
}

// ────── MOUSE INTERACTIONS ──────
// Throttled mousemove for background parallax
let lastMoveTime = 0;
const THROTTLE_DELAY = 16; // ~60fps

document.addEventListener('mousemove', (e) => {
  const now = Date.now();
  if (now - lastMoveTime < THROTTLE_DELAY) return;
  lastMoveTime = now;

  // Background parallax
  const x = (e.clientX / window.innerWidth - 0.5) * 10;
  const y = (e.clientY / window.innerHeight - 0.5) * 10;
  document.querySelector('.bg').style.transform = `translate(${x}px, ${y}px) scale(1.05)`;

  // Custom cursor
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});

// Menu item hover selection (mouse)
menuItems.forEach((item, idx) => {
  item.addEventListener('mouseenter', () => {
    selectedIndex = idx;
    updateSelection();
  });
  item.addEventListener('click', () => {
    handleMenuSelect(item);
  });
});

// Hide custom cursor on touch devices
if (window.matchMedia('(hover:none)').matches) {
  cursor.style.display = 'none';
}
</script>

</body>
</html>
