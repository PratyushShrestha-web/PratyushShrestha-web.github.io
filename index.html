<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050403;overflow:hidden;font-family:sans-serif;color:white}

/* ───────── LOADING SCREEN ───────── */
#loading{
  position:fixed;inset:0;
  background:#050403;
  z-index:9999;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* CLICK TO START */
#enter{
  position:absolute;
  bottom:15%;
  font-size:14px;
  letter-spacing:4px;
  color:rgba(255,255,255,0.5);
  cursor:pointer;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%,100%{opacity:0.3}
  50%{opacity:1}
}

/* SHOOTER */
.shooter{
  position:absolute;
  bottom:18%;
  left:8%;
  width:130px;height:220px;
  background:#000;
  clip-path:polygon(45% 0,60% 0,70% 25%,65% 70%,55% 100%,45% 100%,35% 70%,30% 25%);
  opacity:0;
}

.gun{
  position:absolute;
  top:50%;right:-45px;
  width:60px;height:10px;
  background:#111;
  transform:rotate(-8deg);
}

.flash{
  position:absolute;
  top:48%;right:-65px;
  width:25px;height:25px;
  border-radius:50%;
  background:radial-gradient(circle,#fff 0%,#ffcc66 40%,transparent 70%);
  opacity:0;
}

.impact{
  position:absolute;
  top:40%;left:60%;
  width:8px;height:8px;
  border-radius:50%;
  background:white;
  opacity:0;
}

.crack{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 60% 40%, rgba(255,255,255,0.5) 0%, transparent 40%),
    repeating-radial-gradient(circle at 60% 40%, transparent 0 10px, rgba(255,255,255,0.08) 11px 12px);
  opacity:0;
}

/* MAIN SITE */
#main{
  position:absolute;inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  opacity:0;
}

/* ANIMATIONS */
.shooter.play{animation:enter 0.6s forwards}
.flash.play{animation:flash 0.15s ease 1s forwards}
.impact.play{animation:impact 0.2s ease 1.1s forwards}
.crack.play{animation:crack 0.4s ease 1.2s forwards}
#loading.fade{animation:fadeOut 0.8s ease 2.5s forwards}
#main.show{animation:showMain 1s ease forwards}

@keyframes enter{
  from{transform:translateX(-120px);opacity:0}
  to{transform:translateX(0);opacity:1}
}
@keyframes flash{
  0%{opacity:0;transform:scale(0.5)}
  50%{opacity:1;transform:scale(1.5)}
  100%{opacity:0}
}
@keyframes impact{
  from{opacity:0;transform:scale(0.5)}
  to{opacity:1;transform:scale(2)}
}
@keyframes crack{
  from{opacity:0}
  to{opacity:0.5}
}
@keyframes fadeOut{
  to{opacity:0;pointer-events:none}
}
@keyframes showMain{
  to{opacity:1}
}
  /* AAA BACKGROUND */
.bg{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 70% 40%, rgba(255,200,100,0.08), transparent 60%),
    linear-gradient(120deg,#0a0907,#14110c,#050403);
}

/* CINEMATIC DARK EDGES */
.vignette{
  position:absolute;
  inset:0;
  background:radial-gradient(circle,transparent 50%,rgba(0,0,0,0.8));
  pointer-events:none;
}

/* MENU */
.menu{
  position:absolute;
  left:5%;
  top:50%;
  transform:translateY(-50%);
}

.menu-item{
  font-size:60px;
  margin:10px 0;
  letter-spacing:3px;
  opacity:0.6;
  cursor:pointer;
  transition:0.3s;
}

/* AAA HOVER */
.menu-item:hover{
  opacity:1;
  transform:translateX(10px);
  text-shadow:0 0 20px rgba(255,255,255,0.2);
}

/* HUD */
.hud{
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
  font-size:12px;
  opacity:0.5;
  display:flex;
  justify-content:center;
  gap:30px;
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="gunshot" preload="auto">
  <source src="gunshot.mp3" type="audio/mpeg">
</audio>

<!-- LOADING -->
<div id="loading">

  <div class="shooter" id="shooter">
    <div class="gun"></div>
    <div class="flash" id="flash"></div>
  </div>

  <div class="impact" id="impact"></div>
  <div class="crack" id="crack"></div>

  <div id="enter">[ CLICK TO ENTER ]</div>
</div>

<!-- MAIN -->
<div id="main">
<div id="main">

  <!-- BACKGROUND -->
  <div class="bg"></div>

  <!-- VIGNETTE -->
  <div class="vignette"></div>

  <!-- MENU -->
  <div class="menu">
    <div class="menu-item">ABOUT</div>
    <div class="menu-item">SKILLS</div>
    <div class="menu-item">PROJECTS</div>
    <div class="menu-item">CONTACT</div>
  </div>

  <!-- HUD -->
  <div class="hud">
    <span>↑ ↓ Navigate</span>
    <span>Enter Select</span>
    <span>ESC Back</span>
  </div>

</div>
</div>

<script>
const shooter = document.getElementById('shooter');
const flash = document.getElementById('flash');
const impact = document.getElementById('impact');
const crack = document.getElementById('crack');
const loading = document.getElementById('loading');
const main = document.getElementById('main');
const gun = document.getElementById('gunshot');
const enter = document.getElementById('enter');

enter.addEventListener('click', () => {

  // start animations
  shooter.classList.add('play');
  flash.classList.add('play');
  impact.classList.add('play');
  crack.classList.add('play');

  // play sound EXACTLY at flash (1s)
  setTimeout(()=>{
    gun.currentTime = 0;
    gun.play();
  },1000);

  // transition to site
  setTimeout(()=>{
    loading.classList.add('fade');
    main.classList.add('show');
  },2500);

  // hide button
  enter.style.display = 'none';
});
</script>

</body>
</html>
