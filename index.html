<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;
  height:100%;
  background:#050403;
  font-family:'Noto Sans', sans-serif;
  color:white;
  letter-spacing:1px;
}

body{
  overflow:hidden;
}

/* ───────── LOADING SCREEN ───────── */
#loading{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#050403;
  z-index:9999;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  opacity:1;
  visibility:visible;
  transition:opacity 0.8s ease, visibility 0.8s ease;
}

#loading.fade{
  opacity:0;
  visibility:hidden;
  pointer-events:none;
}

/* TITLE WELCOME */
#gameTitle{
  position:absolute;
  top:15%;
  font-size:48px;
  letter-spacing:8px;
  color:rgba(255,255,255,0.8);
  text-shadow:0 0 20px rgba(255,200,100,0.4);
  animation:titleGlow 3s infinite;
  font-weight:bold;
  font-family:'Press Start 2P', cursive;
}

@keyframes titleGlow{
  0%,100%{text-shadow:0 0 20px rgba(255,200,100,0.4), 0 0 40px rgba(255,200,100,0.2)}
  50%{text-shadow:0 0 40px rgba(255,200,100,0.6), 0 0 60px rgba(255,200,100,0.4)}
}

/* CLICK TO START */
#enter{
  position:absolute;
  bottom:15%;
  font-size:12px;
  letter-spacing:2px;
  color:rgba(255,255,255,0.7);
  cursor:pointer;
  padding:12px 24px;
  border:2px solid rgba(255,255,255,0.5);
  background:rgba(0,0,0,0.3);
  transition:all 0.3s ease;
  font-family:'Press Start 2P', cursive;
  font-weight:bold;
}

#enter:hover{
  color:rgba(255,255,255,1);
  border-color:rgba(255,200,100,0.8);
  background:rgba(255,200,100,0.1);
  box-shadow:0 0 20px rgba(255,200,100,0.4);
}

#enter:focus{
  outline:none;
  box-shadow:0 0 25px rgba(255,200,100,0.6);
}

/* SHOOTER */
.shooter{
  position:absolute;
  bottom:18%;
  left:8%;
  width:130px;
  height:220px;
  background:#000;
  clip-path:polygon(45% 0,60% 0,70% 25%,65% 70%,55% 100%,45% 100%,35% 70%,30% 25%);
  opacity:0;
}

.gun{
  position:absolute;
  top:50%;
  right:-45px;
  width:60px;
  height:10px;
  background:#111;
  transform:rotate(-8deg);
}

.flash{
  position:absolute;
  top:48%;
  right:-65px;
  width:25px;
  height:25px;
  border-radius:50%;
  background:radial-gradient(circle,#fff 0%,#ffcc66 40%,transparent 70%);
  opacity:0;
}

.impact{
  position:absolute;
  top:40%;
  left:60%;
  width:8px;
  height:8px;
  border-radius:50%;
  background:white;
  opacity:0;
}

.crack{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 60% 40%, rgba(255,255,255,0.5) 0%, transparent 40%),
    repeating-radial-gradient(circle at 60% 40%, transparent 0 10px, rgba(255,255,255,0.08) 11px 12px);
  opacity:0;
}

/* MAIN SITE */
#main{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  opacity:0;
  visibility:hidden;
  pointer-events:none;
  transition:opacity 0.5s ease, visibility 0.5s ease;
  z-index:1;
}

#main.show{
  opacity:1;
  visibility:visible;
  pointer-events:auto;
}

/* MODAL OVERLAY */
#modalOverlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  opacity:0;
  visibility:hidden;
  transition:opacity 0.4s ease, visibility 0.4s ease;
  z-index:100;
}

#modalOverlay.active{
  opacity:1;
  visibility:visible;
}

/* MODAL BOX */
.modal{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%) scale(0.9);
  background:rgba(10,9,7,0.95);
  border:2px solid rgba(255,200,100,0.5);
  padding:40px;
  max-width:700px;
  width:90%;
  max-height:70vh;
  overflow-y:auto;
  z-index:101;
  box-shadow:0 0 40px rgba(255,200,100,0.2);
  opacity:0;
  visibility:hidden;
  transition:opacity 0.4s ease, visibility 0.4s ease, transform 0.4s ease;
}

.modal.active{
  opacity:1;
  visibility:visible;
  transform:translate(-50%, -50%) scale(1);
}

.modal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
  border-bottom:2px solid rgba(255,200,100,0.3);
  padding-bottom:15px;
}

.modal-title{
  font-size:28px;
  font-weight:bold;
  color:rgba(255,200,100,0.9);
  letter-spacing:2px;
  font-family:'Press Start 2P', cursive;
}

.modal-close{
  background:none;
  border:none;
  color:rgba(255,255,255,0.6);
  font-size:24px;
  cursor:pointer;
  transition:color 0.3s ease;
  padding:0;
  width:30px;
  height:30px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.modal-close:hover{
  color:rgba(255,200,100,0.9);
}

.modal-content{
  font-size:14px;
  line-height:1.8;
  color:rgba(255,255,255,0.8);
}

.modal-content p{
  margin-bottom:15px;
}

.modal-content strong{
  color:rgba(255,200,100,0.9);
  font-weight:700;
}

/* ANIMATIONS */
.shooter.play{animation:enter 0.6s forwards}
.flash.play{animation:flash 0.15s ease 1s forwards}
.impact.play{animation:impact 0.2s ease 1.1s forwards}
.crack.play{animation:crack 0.4s ease 1.2s forwards}

@keyframes enter{
  from{transform:translateX(-120px);opacity:0}
  to{transform:translateX(0);opacity:1}
}

@keyframes flash{
  0%{opacity:0;transform:scale(0.5)}
  50%{opacity:1;transform:scale(1.5)}
  100%{opacity:0}
}

@keyframes impact{
  from{opacity:0;transform:scale(0.5)}
  to{opacity:1;transform:scale(2)}
}

@keyframes crack{
  from{opacity:0}
  to{opacity:0.5}
}

/* AAA BACKGROUND */
.bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 70% 40%, rgba(255,200,100,0.08), transparent 60%),
    linear-gradient(120deg,#0a0907,#14110c,#050403);
  z-index:0;
}

.bg::after{
  content:'';
  position:absolute;
  top:30%;
  right:20%;
  width:200px;
  height:300px;
  background:radial-gradient(circle, rgba(255,200,120,0.15), transparent 70%);
  filter:blur(20px);
  animation:flicker 6s infinite;
}

@keyframes flicker{
  0%,100%{opacity:1}
  50%{opacity:0.6}
}

/* CINEMATIC DARK EDGES */
.vignette{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:radial-gradient(circle,transparent 50%,rgba(0,0,0,0.6));
  pointer-events:none;
  z-index:2;
}

.menu{
  position:fixed;
  left:5%;
  top:50%;
  transform:translateY(-50%);
  z-index:10;
}

.menu-item{
  font-size:24px;
  margin:16px 0;
  letter-spacing:2px;
  opacity:0;
  transform:translateX(-40px);
  cursor:pointer;
  transition:0.4s ease;
  padding:10px 16px;
  border-left:4px solid transparent;
  background:transparent;
  color:rgba(255,255,255,0.6);
  font-family:'Press Start 2P', cursive;
  font-weight:bold;
  border:none;
}

/* appear animation */
#main.show .menu-item{
  opacity:0.6;
  transform:translateX(0);
}

/* stagger */
#main.show .menu-item:nth-child(1){transition-delay:0.2s}
#main.show .menu-item:nth-child(2){transition-delay:0.35s}
#main.show .menu-item:nth-child(3){transition-delay:0.5s}
#main.show .menu-item:nth-child(4){transition-delay:0.65s}

/* hover & focus */
.menu-item:hover,
.menu-item.active{
  opacity:1;
  transform:translateX(15px) scale(1.08);
  text-shadow:0 0 25px rgba(255,200,100,0.5);
  border-left-color:rgba(255,200,100,0.8);
  color:rgba(255,200,100,0.9);
}

.menu-item:focus{
  outline:none;
  border-left-color:rgba(255,200,100,1);
}

/* HUD */
.hud{
  position:fixed;
  bottom:20px;
  width:100%;
  text-align:center;
  font-size:10px;
  opacity:0.5;
  display:flex;
  justify-content:center;
  gap:40px;
  font-family:'Press Start 2P', cursive;
  z-index:10;
}

/* Screen scan effect */
body::after{
  content:'';
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  background:
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 2px,
      rgba(255,255,255,0.03) 2px,
      rgba(255,255,255,0.03) 4px
    );
  opacity:1;
  z-index:9998;
}

/* Custom cursor */
body{
  cursor:auto;
}

#cursor{
  position:fixed;
  width:10px;
  height:10px;
  border:2px solid rgba(255,200,100,0.8);
  border-radius:50%;
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:9997;
  opacity:0;
  box-shadow:0 0 8px rgba(255,200,100,0.5);
}

#cursor.visible{
  opacity:1;
}

/* MOBILE RESPONSIVENESS */
@media (max-width:768px){
  .menu-item{
    font-size:16px;
    margin:8px 0;
    padding:12px;
  }

  .hud{
    font-size:8px;
    gap:15px;
    flex-wrap:wrap;
  }

  .shooter{
    display:none;
  }

  #enter{
    font-size:10px;
  }

  #gameTitle{
    font-size:24px;
  }

  .modal{
    padding:30px;
    width:95%;
  }

  .modal-title{
    font-size:20px;
  }

  .modal-content{
    font-size:12px;
  }
}

@media (max-width:480px){
  .menu-item{
    font-size:14px;
    margin:6px 0;
  }

  .vignette{
    background:radial-gradient(circle,transparent 40%,rgba(0,0,0,0.7));
  }

  #gameTitle{
    font-size:18px;
  }

  .modal{
    max-width:90%;
    padding:20px;
  }

  .modal-title{
    font-size:18px;
  }

  .modal-content{
    font-size:11px;
  }
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="gunshot" preload="auto">
  <source src="gunshot.mp3" type="audio/mpeg">
</audio>

<!-- LOADING -->
<div id="loading" role="status" aria-label="Loading animation">
  <div id="gameTitle">WELCOME</div>

  <div class="shooter" id="shooter" aria-hidden="true">
    <div class="gun"></div>
    <div class="flash" id="flash"></div>
  </div>

  <div class="impact" id="impact" aria-hidden="true"></div>
  <div class="crack" id="crack" aria-hidden="true"></div>

  <button id="enter" aria-label="Click to enter portfolio">CLICK TO ENTER</button>
</div>

<!-- MAIN -->
<div id="main" role="main">
  <!-- BACKGROUND -->
  <div class="bg" aria-hidden="true"></div>

  <!-- VIGNETTE -->
  <div class="vignette" aria-hidden="true"></div>

  <div id="cursor" aria-hidden="true"></div>

  <!-- NAVIGATION MENU -->
  <nav class="menu" role="navigation" aria-label="Main menu">
    <button class="menu-item" data-section="about">ABOUT</button>
    <button class="menu-item" data-section="qualification">QUALIFICATION</button>
    <button class="menu-item" data-section="projects">PROJECTS</button>
    <button class="menu-item" data-section="contact">CONTACT</button>
  </nav>

  <!-- MODAL OVERLAY -->
  <div id="modalOverlay"></div>

  <!-- MODAL BOX -->
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modalTitle">About Me</h2>
      <button class="modal-close" id="modalClose" aria-label="Close modal">✕</button>
    </div>
    <div class="modal-content" id="modalContent"></div>
  </div>

  <!-- HUD -->
  <div class="hud" aria-label="Keyboard navigation hints">
    <span>↑ ↓ NAVIGATE</span>
    <span>ENTER SELECT</span>
    <span>ESC CLOSE</span>
  </div>
</div>

<script>
const shooter = document.getElementById('shooter');
const flash = document.getElementById('flash');
const impact = document.getElementById('impact');
const crack = document.getElementById('crack');
const loading = document.getElementById('loading');
const main = document.getElementById('main');
const gun = document.getElementById('gunshot');
const enterBtn = document.getElementById('enter');
const menuItems = document.querySelectorAll('.menu-item');
const cursor = document.getElementById('cursor');
const modal = document.getElementById('modal');
const modalOverlay = document.getElementById('modalOverlay');
const modalTitle = document.getElementById('modalTitle');
const modalContent = document.getElementById('modalContent');
const modalClose = document.getElementById('modalClose');

let selectedIndex = 0;
let animationPlayed = false;
let modalOpen = false;

const sectionData = {
  about: {
    title: 'ABOUT ME',
    content: `<p>Welcome to my digital portfolio. I'm a full-stack developer passionate about creating immersive digital experiences. With a background in both frontend and backend technologies, I focus on building scalable and performant applications.</p>
    <p style="margin-top:15px;">My journey in tech began with a curiosity about how things work, which evolved into a career dedicated to solving complex problems through code and creative design. I believe in writing clean, maintainable code and creating user experiences that are both intuitive and delightful.</p>
    <p style="margin-top:15px;">When I'm not coding, you can find me exploring new design trends, playing games, or contributing to open-source projects.</p>`
  },
  qualification: {
    title: 'QUALIFICATION',
    content: `<p><strong>Frontend:</strong> HTML5, CSS3, JavaScript, React, Vue.js, Three.js, GSAP</p>
    <p style="margin-top:15px;"><strong>Backend:</strong> Node.js, Express, Python, MongoDB, PostgreSQL, Firebase</p>
    <p style="margin-top:15px;"><strong>Tools & Tech:</strong> Git, Webpack, Vite, Docker, REST APIs, WebSockets, CI/CD</p>
    <p style="margin-top:15px;"><strong>Design:</strong> UI/UX Design, Figma, Animation, Game Development Concepts, Blender</p>
    <p style="margin-top:15px;"><strong>Certifications:</strong> Full Stack Web Development, Advanced JavaScript, Cloud Computing Basics</p>`
  },
  projects: {
    title: 'PROJECTS',
    content: `<p><strong>Project Alpha</strong> - An immersive 3D web experience using Three.js and WebGL. Created interactive particle systems and real-time rendering with advanced shaders.</p>
    <p style="margin-top:15px;"><strong>Project Beta</strong> - Full-stack e-commerce platform with real-time features. Built with React, Node.js, and MongoDB. Implemented payment integration and user management systems.</p>
    <p style="margin-top:15px;"><strong>Project Gamma</strong> - Game menu system with interactive animations and smooth transitions. Created with vanilla JavaScript and CSS animations for a polished gaming experience.</p>
    <p style="margin-top:15px;"><strong>Project Delta</strong> - AI-powered content management system with advanced search and filtering capabilities. Built REST APIs and implemented real-time notifications.</p>`
  },
  contact: {
    title: 'CONTACT',
    content: `<p>Get in touch with me through any of these channels:</p>
    <p style="margin-top:15px;"><strong>Email:</strong> your.email@example.com</p>
    <p style="margin-top:15px;"><strong>GitHub:</strong> github.com/yourprofile</p>
    <p style="margin-top:15px;"><strong>LinkedIn:</strong> linkedin.com/in/yourprofile</p>
    <p style="margin-top:15px;"><strong>Twitter:</strong> @yourhandle</p>
    <p style="margin-top:15px;"><strong>Portfolio:</strong> yourportfolio.com</p>`
  }
};

// ────── ENTER ANIMATION ──────
enterBtn.addEventListener('click', playEnterAnimation);
enterBtn.addEventListener('keypress', (e) => {
  if (e.key === 'Enter' || e.key === ' ') {
    playEnterAnimation();
  }
});

function playEnterAnimation() {
  if (animationPlayed) return;
  animationPlayed = true;

  // start animations
  shooter.classList.add('play');
  flash.classList.add('play');
  impact.classList.add('play');
  crack.classList.add('play');

  // play sound EXACTLY at flash (1s)
  setTimeout(() => {
    gun.currentTime = 0;
    gun.play().catch(() => console.log('Audio playback failed or blocked'));
  }, 1000);

  // transition to site
  setTimeout(() => {
    loading.classList.add('fade');
    main.classList.add('show');
    enterBtn.style.display = 'none';
    cursor.classList.add('visible');
    menuItems[0].focus();
  }, 2500);
}

// ────── MODAL FUNCTIONS ──────
function openModal(sectionId) {
  const data = sectionData[sectionId];
  if (!data) return;

  modalTitle.textContent = data.title;
  modalContent.innerHTML = data.content;
  modal.classList.add('active');
  modalOverlay.classList.add('active');
  modalOpen = true;
  modalClose.focus();
}

function closeModal() {
  modal.classList.remove('active');
  modalOverlay.classList.remove('active');
  modalOpen = false;
  menuItems[selectedIndex].focus();
}

// Modal close button
modalClose.addEventListener('click', closeModal);

// Modal overlay click to close
modalOverlay.addEventListener('click', closeModal);

// Prevent modal click from closing
modal.addEventListener('click', (e) => {
  e.stopPropagation();
});

// ────── KEYBOARD NAVIGATION ──────
document.addEventListener('keydown', (e) => {
  if (!main.classList.contains('show')) return;

  // Handle modal-open state
  if (modalOpen) {
    if (e.key === 'Escape') {
      e.preventDefault();
      closeModal();
    }
    return;
  }

  const itemCount = menuItems.length;

  switch(e.key) {
    case 'ArrowUp':
      e.preventDefault();
      selectedIndex = (selectedIndex - 1 + itemCount) % itemCount;
      updateSelection();
      break;
    case 'ArrowDown':
      e.preventDefault();
      selectedIndex = (selectedIndex + 1) % itemCount;
      updateSelection();
      break;
    case 'Enter':
      e.preventDefault();
      handleMenuSelect(menuItems[selectedIndex]);
      break;
    case 'Escape':
      e.preventDefault();
      break;
  }
});

function updateSelection() {
  menuItems.forEach((item, idx) => {
    if (idx === selectedIndex) {
      item.classList.add('active');
      item.focus();
    } else {
      item.classList.remove('active');
    }
  });
}

function handleMenuSelect(item) {
  const section = item.dataset.section;
  openModal(section);
}

// ────── MOUSE INTERACTIONS ──────
// Throttled mousemove for background parallax
let lastMoveTime = 0;
const THROTTLE_DELAY = 16; // ~60fps

document.addEventListener('mousemove', (e) => {
  const now = Date.now();
  if (now - lastMoveTime < THROTTLE_DELAY) return;
  lastMoveTime = now;

  // Show cursor
  if (main.classList.contains('show')) {
    cursor.classList.add('visible');
  }

  // Background parallax
  const x = (e.clientX / window.innerWidth - 0.5) * 10;
  const y = (e.clientY / window.innerHeight - 0.5) * 10;
  document.querySelector('.bg').style.transform = `translate(${x}px, ${y}px) scale(1.05)`;

  // Custom cursor
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});

// Menu item hover selection (mouse)
menuItems.forEach((item, idx) => {
  item.addEventListener('mouseenter', () => {
    selectedIndex = idx;
    updateSelection();
  });
  item.addEventListener('click', () => {
    handleMenuSelect(item);
  });
});

// Hide custom cursor on touch devices
if (window.matchMedia('(hover:none)').matches) {
  cursor.style.display = 'none';
}
</script>

</body>
</html>
